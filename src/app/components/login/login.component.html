<div
  class="min-h-screen flex flex-col items-center justify-center px-4 py-6 sm:px-5 sm:py-10 font-nunito relative z-10"
  [style.--camp-color]="campColor"
>
  <!-- Header -->
  <div class="text-center mb-4 sm:mb-7 relative z-10 animate-fade-in-down">
    <div class="relative inline-block mb-1 sm:mb-2">
      <span
        class="block text-5xl sm:text-7xl leading-none drop-shadow-[0_6px_20px_rgba(0,0,0,0.25)]"
        >⛺</span
      >
      <span
        class="absolute -top-1 -right-3 sm:-top-2 sm:-right-[18px] text-lg sm:text-2xl animate-bounce-slow"
        >☀️</span
      >
      <span
        class="absolute -bottom-1 -left-4 sm:-left-[22px] text-base sm:text-xl"
        >🌲</span
      >
      <span
        class="absolute -bottom-1 -right-4 sm:-right-[22px] text-base sm:text-xl"
        >🌲</span
      >
    </div>
    <h1
      class="font-display text-[1.5rem] sm:text-[2rem] font-black text-white -tracking-wide mb-1"
      style="font-family: var(--font-display, &quot;Neucha&quot;, sans-serif)"
    >
      {{ campName || "Лагерь" }}
    </h1>
    <p
      class="text-[0.72rem] sm:text-[0.78rem] font-bold text-white/70 tracking-wide"
    >
      {{ campOrganization }}
    </p>
  </div>

  <!-- Card -->
  <div
    class="bg-white rounded-[22px] sm:rounded-[28px] p-5 sm:p-7 sm:px-6 w-full max-w-[400px] shadow-camp relative z-10 animate-fade-in-up"
  >
    <!-- QR hint -->
    <div
      *ngIf="qrPrefilled"
      class="flex items-center gap-2 rounded-xl px-3 py-2.5 mb-4 text-[0.78rem] font-bold"
      [style.backgroundColor]="campColorBg"
      [style.color]="campColor"
    >
      <app-icon name="qr-code" [size]="15"></app-icon>
      Данные подставлены из QR-кода — введите код доступа
    </div>

    <!-- Mode tabs -->
    <div
      class="flex bg-camp-muted rounded-xl sm:rounded-[14px] p-1 mb-4 sm:mb-[22px] gap-1"
    >
      <button
        type="button"
        class="flex-1 flex items-center justify-center gap-1 sm:gap-1.5 py-2 sm:py-[10px] px-2 sm:px-3 rounded-[8px] sm:rounded-[10px] text-[0.78rem] sm:text-[0.82rem] font-bold transition-all duration-200"
        [style.backgroundColor]="mode === 'staff' ? 'white' : 'transparent'"
        [style.color]="mode === 'staff' ? campColor : '#A8A29E'"
        [style.boxShadow]="
          mode === 'staff' ? '0 2px 8px rgba(0,0,0,0.08)' : 'none'
        "
        (click)="mode = 'staff'"
      >
        <app-icon name="shield" [size]="15"></app-icon>
        Персонал
      </button>
      <button
        type="button"
        class="flex-1 flex items-center justify-center gap-1 sm:gap-1.5 py-2 sm:py-[10px] px-2 sm:px-3 rounded-[8px] sm:rounded-[10px] text-[0.78rem] sm:text-[0.82rem] font-bold transition-all duration-200"
        [style.backgroundColor]="
          mode === 'participant' ? 'white' : 'transparent'
        "
        [style.color]="mode === 'participant' ? campColor : '#A8A29E'"
        [style.boxShadow]="
          mode === 'participant' ? '0 2px 8px rgba(0,0,0,0.08)' : 'none'
        "
        (click)="mode = 'participant'"
      >
        <app-icon name="tent" [size]="15"></app-icon>
        Участник
      </button>
    </div>

    <!-- Staff fields -->
    <div *ngIf="mode === 'staff'" class="animate-fade-in-up">
      <div class="mb-3">
        <label
          class="flex items-center gap-1.5 text-[0.72rem] sm:text-[0.78rem] font-bold text-camp-gray mb-1.5 uppercase tracking-wide"
        >
          <app-icon
            name="user"
            [size]="13"
            [style.color]="campColor"
          ></app-icon>
          Логин
        </label>
        <input
          class="w-full px-3 sm:px-[14px] py-[9px] sm:py-[11px] bg-camp-input border-2 rounded-xl text-[0.85rem] sm:text-[0.9rem] font-medium text-camp-stone outline-none transition-colors duration-200 placeholder:text-[#c7bfb8]"
          style="border-color: transparent"
          [style.--tw-ring-color]="campColorLight"
          [(ngModel)]="username"
          placeholder="Введите логин"
          autocomplete="username"
          (focus)="
            $any($event.target).style.borderColor = campColor;
            $any($event.target).style.backgroundColor = 'white'
          "
          (blur)="
            $any($event.target).style.borderColor = 'transparent';
            $any($event.target).style.backgroundColor = ''
          "
        />
      </div>
      <div class="mb-3">
        <label
          class="flex items-center gap-1.5 text-[0.72rem] sm:text-[0.78rem] font-bold text-camp-gray mb-1.5 uppercase tracking-wide"
        >
          <app-icon
            name="lock"
            [size]="13"
            [style.color]="campColor"
          ></app-icon>
          Пароль
        </label>
        <div class="relative">
          <input
            class="w-full pl-3 sm:pl-[14px] pr-10 sm:pr-[44px] py-[9px] sm:py-[11px] bg-camp-input border-2 rounded-xl text-[0.85rem] sm:text-[0.9rem] font-medium text-camp-stone outline-none transition-colors duration-200 placeholder:text-[#c7bfb8]"
            style="border-color: transparent"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Введите пароль"
            autocomplete="current-password"
            (focus)="
              $any($event.target).style.borderColor = campColor;
              $any($event.target).style.backgroundColor = 'white'
            "
            (blur)="
              $any($event.target).style.borderColor = 'transparent';
              $any($event.target).style.backgroundColor = ''
            "
          />
          <button
            class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-camp-subtle flex items-center p-0 transition-colors"
            (click)="showPassword = !showPassword"
            type="button"
            [style.color]="campColor"
          >
            <app-icon
              [name]="showPassword ? 'eye-off' : 'eye'"
              [size]="16"
            ></app-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Participant fields -->
    <div *ngIf="mode === 'participant'" class="animate-fade-in-up">
      <div class="mb-3">
        <label
          class="flex items-center gap-1.5 text-[0.72rem] sm:text-[0.78rem] font-bold text-camp-gray mb-1.5 uppercase tracking-wide"
        >
          <app-icon
            name="user"
            [size]="13"
            [style.color]="campColor"
          ></app-icon>
          Фамилию и Имя
        </label>
        <input
          class="w-full px-3 sm:px-[14px] py-[9px] sm:py-[11px] bg-camp-input border-2 rounded-xl text-[0.85rem] sm:text-[0.9rem] font-medium text-camp-stone outline-none transition-colors duration-200 placeholder:text-[#c7bfb8]"
          style="border-color: transparent"
          [(ngModel)]="fullName"
          placeholder="Введите фамилию и имя"
          autocomplete="name"
          (focus)="
            $any($event.target).style.borderColor = campColor;
            $any($event.target).style.backgroundColor = 'white'
          "
          (blur)="
            $any($event.target).style.borderColor = 'transparent';
            $any($event.target).style.backgroundColor = ''
          "
        />
      </div>
      <div class="mb-3">
        <label
          class="flex items-center gap-1.5 text-[0.72rem] sm:text-[0.78rem] font-bold text-camp-gray mb-1.5 uppercase tracking-wide"
        >
          <app-icon
            name="lock"
            [size]="13"
            [style.color]="campColor"
          ></app-icon>
          Код доступа
        </label>
        <div class="flex gap-2 sm:gap-2.5 justify-center">
          <input
            *ngFor="
              let digit of accessCodeDigits;
              let i = index;
              trackBy: trackByIndex
            "
            #codeCell
            type="text"
            maxlength="1"
            inputmode="numeric"
            pattern="[0-9]*"
            [(ngModel)]="accessCodeDigits[i]"
            class="w-[46px] h-[46px] sm:w-[52px] sm:h-[52px] text-center bg-camp-input border-2 rounded-xl text-[1.1rem] sm:text-[1.3rem] font-bold text-camp-stone outline-none transition-colors duration-200"
            style="border-color: transparent"
            [value]="digit"
            (input)="onCodeInput(i)"
            (focus)="
              onCodeFocus($event);
              $any($event.target).style.borderColor = campColor;
              $any($event.target).style.backgroundColor = 'white'
            "
            (blur)="
              $any($event.target).style.borderColor = 'transparent';
              $any($event.target).style.backgroundColor = ''
            "
            (keydown)="onCodeKeydown(i, $event)"
          />
        </div>
      </div>
    </div>

    <!-- Error -->
    <div
      *ngIf="error"
      class="flex items-center gap-[7px] bg-camp-errorBg text-camp-error rounded-[10px] px-3 sm:px-[14px] py-[9px] sm:py-[10px] text-[0.78rem] sm:text-[0.82rem] font-bold mb-3 animate-shake"
    >
      <app-icon name="circle-alert" [size]="14"></app-icon>
      {{ error }}
    </div>

    <!-- Submit -->
    <button
      class="w-full py-[12px] sm:py-[14px] text-white border-none rounded-2xl text-[0.88rem] sm:text-[0.95rem] font-extrabold cursor-pointer transition-all duration-200 mt-1 hover:-translate-y-px active:translate-y-0 active:scale-[0.98] disabled:bg-camp-border disabled:text-camp-subtle disabled:shadow-none disabled:cursor-not-allowed"
      [style.backgroundColor]="loading ? '' : campColor"
      [style.boxShadow]="'0 4px 18px ' + campColorLight"
      (click)="login()"
      [disabled]="loading"
    >
      <span *ngIf="!loading" class="flex items-center justify-center gap-2">
        <app-icon name="log-in" [size]="17"></app-icon>
        Войти
      </span>
      <span *ngIf="loading" class="flex items-center justify-center gap-2">
        <span
          class="w-[17px] h-[17px] border-[2.5px] border-white/35 border-t-white rounded-full inline-block animate-spin-btn"
        ></span>
        Вход...
      </span>
    </button>

    <!-- Register link -->
    <div *ngIf="mode === 'staff'" class="text-center mt-4 sm:mt-[18px]">
      <a
        class="inline-flex items-center gap-1 text-[0.78rem] sm:text-[0.82rem] font-bold text-camp-subtle cursor-pointer no-underline transition-colors duration-200"
        (click)="goToRegister()"
      >
        Нет аккаунта?
        <span [style.color]="campColor">Зарегистрироваться</span>
        <app-icon
          name="arrow-right"
          [size]="13"
          [style.color]="campColor"
        ></app-icon>
      </a>
    </div>
  </div>
</div>
