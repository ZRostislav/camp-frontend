<h2>Расписание дня</h2>
<div *ngIf="error" style="color: red; margin-bottom: 10px">{{ error }}</div>
<div *ngIf="msg" style="color: green; margin-bottom: 10px">{{ msg }}</div>

<div
  *ngIf="auth.isAdmin()"
  style="
    border: 1px solid #ccc;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 4px;
  "
>
  <h3>Добавить пункт</h3>
  <div style="margin-bottom: 6px">
    Время: <input [(ngModel)]="form.time" placeholder="08:00" />
  </div>
  <div style="margin-bottom: 6px">
    Название: <input [(ngModel)]="form.title" />
  </div>

  <!-- Эмодзи с пикером (форма создания) -->
  <div class="emoji-field" style="margin-bottom: 6px">
    <label>Эмодзи:</label>
    <div class="emoji-input-wrap">
      <span class="emoji-preview" (click)="toggleFormEmojiPicker($event)">
        {{ form.emoji || "😀" }}
      </span>
      <input
        [(ngModel)]="form.emoji"
        placeholder="или введите вручную"
        class="emoji-text-input"
      />
      <button class="emoji-btn" (click)="toggleFormEmojiPicker($event)">
        ☺
      </button>
    </div>
    <div
      class="emoji-picker-wrap"
      *ngIf="showFormEmojiPicker"
      (click)="$event.stopPropagation()"
    >
      <emoji-mart
        (emojiSelect)="onFormEmojiSelect($event)"
        [showPreview]="false"
        [i18n]="{
          search: 'Поиск',
          categories: { search: 'Результаты', recent: 'Частые' },
        }"
      ></emoji-mart>
    </div>
  </div>

  <button (click)="create()">Добавить</button>
</div>

<div style="border: 1px solid #ccc; border-radius: 4px; overflow: hidden">
  <div
    style="
      display: flex;
      background: #f5f5f5;
      font-weight: bold;
      padding: 10px;
      border-bottom: 1px solid #ccc;
    "
  >
    <div *ngIf="auth.isAdmin()" style="width: 40px"></div>
    <div style="width: 80px">Порядок</div>
    <div style="width: 90px">Время</div>
    <div style="width: 70px">Эмодзи</div>
    <div style="flex: 1">Название</div>
    <div *ngIf="auth.isAdmin()" style="width: 90px; text-align: right">
      Действия
    </div>
  </div>

  <div
    cdkDropList
    (cdkDropListDropped)="drop($event)"
    [cdkDropListDisabled]="!auth.isAdmin()"
    style="background: white"
  >
    <div
      *ngFor="let s of items"
      cdkDrag
      style="
        display: flex;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #eee;
        background: white;
      "
    >
      <div
        *ngIf="auth.isAdmin()"
        cdkDragHandle
        style="
          width: 40px;
          cursor: grab;
          color: #888;
          font-size: 18px;
          user-select: none;
        "
      >
        ☰
      </div>
      <div style="width: 80px">{{ s.order_index }}</div>
      <div style="width: 90px">{{ s.time }}</div>
      <div style="width: 70px; font-size: 18px">{{ s.emoji }}</div>
      <div style="flex: 1; word-break: break-word">{{ s.title }}</div>
      <div *ngIf="auth.isAdmin()" style="width: 90px; text-align: right">
        <button
          (click)="startEdit(s)"
          style="margin-right: 4px; padding: 2px 6px"
        >
          ✏️
        </button>
        <button (click)="remove(s.id)" style="padding: 2px 6px">🗑️</button>
      </div>
      <div *cdkDragPlaceholder style="background: #f0f7ff; height: 100%"></div>
    </div>
  </div>
</div>

<!-- Редактирование -->
<div
  *ngIf="editItem"
  style="
    margin-top: 16px;
    border: 1px solid #ccc;
    padding: 12px;
    border-radius: 4px;
  "
>
  <h4>Редактирование</h4>
  <div style="margin-bottom: 6px">
    Время: <input [(ngModel)]="editItem.time" />
  </div>
  <div style="margin-bottom: 6px">
    Название: <input [(ngModel)]="editItem.title" />
  </div>

  <!-- Эмодзи с пикером (форма редактирования) -->
  <div class="emoji-field" style="margin-bottom: 6px">
    <label>Эмодзи:</label>
    <div class="emoji-input-wrap">
      <span class="emoji-preview" (click)="toggleEditEmojiPicker($event)">
        {{ editItem.emoji || "😀" }}
      </span>
      <input
        [(ngModel)]="editItem.emoji"
        placeholder="или введите вручную"
        class="emoji-text-input"
      />
      <button class="emoji-btn" (click)="toggleEditEmojiPicker($event)">
        ☺
      </button>
    </div>
    <div
      class="emoji-picker-wrap"
      *ngIf="showEditEmojiPicker"
      (click)="$event.stopPropagation()"
    >
      <emoji-mart
        (emojiSelect)="onEditEmojiSelect($event)"
        [showPreview]="false"
        [i18n]="{
          search: 'Поиск',
          categories: { search: 'Результаты', recent: 'Частые' },
        }"
      ></emoji-mart>
    </div>
  </div>

  <div style="margin-bottom: 6px">
    Порядок:
    <input
      type="number"
      [(ngModel)]="editItem.order_index"
      style="width: 60px"
    />
  </div>
  <button (click)="saveEdit()">Сохранить</button>
  <button
    (click)="editItem = null; showEditEmojiPicker = false"
    style="margin-left: 8px"
  >
    Отмена
  </button>
</div>
