<div
  class="min-h-screen flex items-center justify-center p-4 font-nunito animate-fade-in-up"
>
  <div
    class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-camp-border p-6 sm:p-8 text-center animate-fade-in-down"
  >
    <!-- Эмодзи-иконка -->
    <div
      class="w-16 h-16 sm:w-20 sm:h-20 mx-auto rounded-2xl flex items-center justify-center text-3xl sm:text-4xl mb-4"
      [style.backgroundColor]="campColorBg"
    >
      {{ emoji }}
    </div>

    <!-- Код ошибки -->
    <div
      class="inline-block px-3 py-1 rounded-full text-xs font-bold text-white mb-3"
      [style.backgroundColor]="campColor"
    >
      Ошибка {{ code }}
    </div>

    <!-- Заголовок -->
    <h1
      style="font-family: var(--font-display, &quot;Neucha&quot;, sans-serif)"
      class="font-display text-xl sm:text-2xl font-bold text-camp-stone mb-2 leading-tight"
    >
      {{ title }}
    </h1>

    <!-- Сообщение -->
    <p class="text-sm text-camp-gray leading-relaxed mb-6">
      {{ message }}
    </p>

    <!-- Действия -->
    <div class="flex flex-col sm:flex-row gap-2.5 justify-center">
      <button
        type="button"
        (click)="goBack()"
        class="px-4 py-2.5 rounded-xl text-sm font-bold text-white shadow-camp-btn transition-transform hover:scale-[1.02]"
        [style.backgroundColor]="campColor"
      >
        🏠 На главную
      </button>
      <button
        type="button"
        (click)="reload()"
        class="px-4 py-2.5 rounded-xl text-sm font-semibold text-camp-stone bg-camp-muted hover:bg-camp-border transition-colors"
      >
        🔄 Обновить страницу
      </button>
    </div>

    <p *ngIf="campName" class="text-xs text-camp-subtle mt-6">
      🏕️ {{ campName }}
    </p>
  </div>
</div>
